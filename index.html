<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JengaUI: AI-Powered UI Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              'brand-bg':        '#04020f',
              'brand-surface':   '#0d0b1a',
              'brand-primary':   '#06b6d4',
              'brand-violet':    '#7c3aed',
              'brand-secondary': '#0891b2',
              'brand-muted':     '#64748b',
              'brand-border':    'rgba(255,255,255,0.07)',
              'brand-glow':      'rgba(6, 182, 212, 0.12)',
            },
            backgroundImage: {
              'cta-gradient': 'linear-gradient(135deg, #06b6d4 0%, #7c3aed 100%)',
            },
            animation: {
              'pulse-fast':  'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in':     'fadeIn 0.4s ease-out forwards',
              'slide-up':    'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'shimmer':     'shimmer 2.4s linear infinite',
            },
            keyframes: {
              fadeIn:  { '0%': { opacity: 0 },                                     '100%': { opacity: 1 } },
              slideUp: { '0%': { transform: 'translateY(12px)', opacity: 0 },       '100%': { transform: 'translateY(0)', opacity: 1 } },
              shimmer: { '0%': { backgroundPosition: '-200% center' },              '100%': { backgroundPosition: '200% center' } },
            },
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom": "https://esm.sh/react-dom@^19.1.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.1.0/client",
    "react/": "https://esm.sh/react@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.8.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/"
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    background-color: #04020f;
    color: #f1f5f9;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Ambient background orbs — give the glass something to distort */
  .bg-orb-1 {
    position: fixed; top: -15%; left: -8%; width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(124,58,237,0.22) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0;
  }
  .bg-orb-2 {
    position: fixed; top: 25%; right: -12%; width: 550px; height: 550px;
    background: radial-gradient(circle, rgba(6,182,212,0.14) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0;
  }
  .bg-orb-3 {
    position: fixed; bottom: -10%; left: 30%; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(79,70,229,0.15) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none; z-index: 0;
  }

  /* Fine grid overlay */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-size: 44px 44px;
    background-image:
      linear-gradient(to right,  rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 90%);
  }

  /* Glass card base */
  .glass {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.06) inset,
      0 20px 40px -12px rgba(0,0,0,0.5);
  }

  /* Gradient CTA button shimmer */
  .btn-cta {
    background: linear-gradient(135deg, #06b6d4 0%, #7c3aed 100%);
    background-size: 200% auto;
    transition: background-position 0.4s ease, box-shadow 0.2s ease, transform 0.15s ease;
  }
  .btn-cta:hover:not(:disabled) {
    background-position: right center;
    box-shadow: 0 0 24px rgba(124,58,237,0.35), 0 4px 12px rgba(0,0,0,0.3);
    transform: translateY(-1px);
  }
  .btn-cta:active:not(:disabled) { transform: translateY(0); }

  /* Custom scrollbar */
  ::-webkit-scrollbar       { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
  <body class="min-h-screen relative selection:bg-violet-500/30 selection:text-violet-200">
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>
    <div class="bg-orb-3"></div>
    <div class="bg-grid"></div>
    <div id="root" class="relative z-10"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
