<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <title>UI Muse: AI-Powered UI Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              'brand-bg': 'var(--brand-bg)',
              'brand-surface': 'var(--brand-surface)',
              'brand-primary': '#06b6d4',
              'brand-secondary': '#0891b2',
              'brand-muted': 'var(--brand-muted)',
              'brand-border': 'var(--brand-border)',
              'brand-glow': 'var(--brand-glow)',
              'brand-text': 'var(--brand-text)',
            },
            animation: {
              'pulse-fast': 'pulse var(--anim-pulse-duration, 1.5s) cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in': 'fadeIn var(--anim-duration-fade, 0.4s) ease-out forwards',
              'slide-up': 'slideUp var(--anim-duration-slide, 0.5s) cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: 0 },
                '100%': { opacity: 1 },
              },
              slideUp: {
                '0%': { transform: 'translateY(calc(10px * var(--anim-intensity, 1)))', opacity: 0 },
                '100%': { transform: 'translateY(0)', opacity: 1 },
              },
            }
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom": "https://esm.sh/react-dom@^19.1.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.1.0/client",
    "react/": "https://esm.sh/react@^19.1.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.8.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.477.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/"
  }
}
</script>
<style>
  :root {
    --brand-bg: #f8fafc;
    --brand-surface: #ffffff;
    --brand-muted: #64748b;
    --brand-border: #e2e8f0;
    --brand-text: #0f172a;
    --brand-glow: rgba(6, 182, 212, 0.1);
    --grid-color: rgba(0, 0, 0, 0.05);
  }

  .dark {
    --brand-bg: #020617;
    --brand-surface: #0f172a;
    --brand-muted: #94a3b8;
    --brand-border: #1e293b;
    --brand-text: #f8fafc;
    --brand-glow: rgba(6, 182, 212, 0.15);
    --grid-color: rgba(255, 255, 255, 0.02);
  }

  body {
    background-color: var(--brand-bg);
    color: var(--brand-text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .bg-grid {
    background-size: 40px 40px;
    background-image: linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                      linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
    mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
  }
  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #020617; 
  }
  ::-webkit-scrollbar-thumb {
    background: #1e293b; 
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #334155; 
  }
</style>
</head>
  <body class="min-h-screen relative selection:bg-brand-primary selection:text-black">
    <div class="fixed inset-0 -z-10 h-full w-full bg-grid pointer-events-none"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
